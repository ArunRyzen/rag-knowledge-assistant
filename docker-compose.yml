# Postgres + pgvector for the production vector-store backend.
# Start with `docker compose up -d`, then set in .env:
#   VECTOR_STORE=pgvector
#   DATABASE_URL=postgresql://rag:rag@localhost:5432/rag

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
